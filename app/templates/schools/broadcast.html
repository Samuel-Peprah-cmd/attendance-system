{% extends "base.html" %}
{% block content %}

<link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
<script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>

<div class="max-w-6xl mx-auto py-6 md:py-10">
    <div class="mb-8 flex justify-between items-center">
        <div>
            <h2 class="text-3xl font-black text-gray-800 tracking-tight uppercase">Broadcast Hub</h2>
            <p class="text-gray-400 text-sm font-bold uppercase tracking-widest mt-1">Multi-Channel Communication</p>
        </div>
    </div>

    <form id="broadcastForm" action="{{ url_for('communications.send_broadcast') }}" method="POST" enctype="multipart/form-data" class="grid grid-cols-1 lg:grid-cols-3 gap-8">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
        
        <div class="lg:col-span-2 space-y-6">
            <div class="bg-white p-8 rounded-[2rem] shadow-sm border border-gray-100">
                <h3 class="text-[10px] font-black text-gray-400 uppercase mb-6 border-b border-gray-50 pb-2 tracking-[0.2em]">Message Composer</h3>
                
                <div class="mb-6">
                    <label class="block text-xs font-black text-gray-600 uppercase tracking-tighter ml-1 mb-2">Subject / Title</label>
                    <input type="text" name="subject" placeholder="e.g. Urgent: Mid-Term Break Updates" required
                           class="w-full p-4 bg-gray-50 border border-gray-100 rounded-2xl focus:ring-2 focus:ring-gray-900/5 outline-none transition font-bold text-gray-800">
                </div>

                <div class="mb-6">
                    <label class="block text-xs font-black text-gray-600 uppercase tracking-tighter ml-1 mb-2">Message Body</label>
                    <div class="bg-white border border-gray-200 rounded-2xl overflow-hidden">
                        <div id="editor" class="h-64 text-gray-800 text-sm"></div>
                    </div>
                    <input type="hidden" name="message_html" id="message_html">
                </div>

                <div>
                    <label class="block text-xs font-black text-gray-600 uppercase tracking-tighter ml-1 mb-2">Attachments (Images, PDFs)</label>
                    <input type="file" name="attachments" multiple
                           class="w-full p-4 bg-gray-50 border border-gray-100 border-dashed rounded-2xl file:mr-4 file:py-2 file:px-4 file:rounded-xl file:border-0 file:text-xs file:font-black file:bg-gray-900 file:text-white hover:file:bg-gray-800 cursor-pointer text-sm text-gray-500">
                    <p class="text-[10px] text-gray-400 mt-2 ml-1 font-bold uppercase">Hold CTRL/CMD to select multiple files.</p>
                </div>
            </div>
        </div>

        <div class="space-y-6">
            <div class="bg-white p-8 rounded-[2rem] shadow-sm border border-gray-100">
                
                <h3 class="text-[10px] font-black text-gray-400 uppercase mb-6 border-b border-gray-50 pb-2 tracking-[0.2em]">Target Audience</h3>
                <div class="space-y-3 mb-8">
                    <label class="flex items-center gap-3 p-3 border border-gray-100 rounded-xl cursor-pointer hover:bg-gray-50 transition">
                        <input type="radio" name="audience" value="all_parents" checked class="w-4 h-4 text-gray-900 focus:ring-gray-900">
                        <span class="text-xs font-bold text-gray-700 uppercase">All Parents</span>
                    </label>
                    <label class="flex items-center gap-3 p-3 border border-gray-100 rounded-xl cursor-pointer hover:bg-gray-50 transition">
                        <input type="radio" name="audience" value="all_staff" class="w-4 h-4 text-gray-900 focus:ring-gray-900">
                        <span class="text-xs font-bold text-gray-700 uppercase">All Staff</span>
                    </label>
                </div>

                <h3 class="text-[10px] font-black text-gray-400 uppercase mb-6 border-b border-gray-50 pb-2 tracking-[0.2em]">Delivery Channels</h3>
                <div class="space-y-3 mb-8">
                    <label class="flex items-center gap-3 p-3 border border-blue-100 bg-blue-50/50 rounded-xl cursor-pointer">
                        <input type="checkbox" name="channels" value="email" checked class="w-4 h-4 text-blue-600 rounded">
                        <span class="text-xs font-bold text-blue-900 uppercase">Email (HTML)</span>
                    </label>
                    <label class="flex items-center gap-3 p-3 border border-green-100 bg-green-50/50 rounded-xl cursor-pointer">
                        <input type="checkbox" name="channels" value="whatsapp" class="w-4 h-4 text-green-600 rounded">
                        <span class="text-xs font-bold text-green-900 uppercase">WhatsApp (Twilio)</span>
                    </label>
                    <label class="flex items-center gap-3 p-3 border border-gray-200 bg-gray-50 rounded-xl cursor-pointer">
                        <input type="checkbox" name="channels" value="sms" class="w-4 h-4 text-gray-600 rounded">
                        <span class="text-xs font-bold text-gray-700 uppercase">SMS Text (Basic)</span>
                    </label>
                </div>

                <button type="submit" id="submitBtn" class="w-full bg-gray-900 text-white py-4 rounded-xl font-black uppercase tracking-widest hover:brightness-110 transition shadow-lg shadow-gray-900/30 flex justify-center items-center gap-2">
                    <span>🚀 Launch Broadcast</span>
                </button>
            </div>
        </div>
    </form>
</div>

<script>
    var quill = new Quill('#editor', {
        theme: 'snow',
        placeholder: 'Compose your message here...',
        modules: {
            toolbar: [
                ['bold', 'italic', 'underline'],
                [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                ['link', 'clean']
            ]
        }
    });

    var form = document.getElementById('broadcastForm');
    form.onsubmit = function() {
        var htmlContent = document.querySelector('.ql-editor').innerHTML;
        
        if (htmlContent === '<p><br></p>' || htmlContent.trim() === '') {
            alert('Please write a message before broadcasting.');
            return false;
        }
        
        document.getElementById('message_html').value = htmlContent;
        
        var btn = document.getElementById('submitBtn');
        btn.innerHTML = '<span class="animate-spin">⏳</span> Dispatching...';
        btn.classList.add('opacity-75', 'cursor-not-allowed');
    };
</script>

{% endblock %}
