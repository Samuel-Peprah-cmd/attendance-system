{% extends "base.html" %}

{% block content %}
<div class="p-6 max-w-7xl mx-auto">
    <div class="mb-8">
        <h1 class="text-3xl font-black text-white uppercase tracking-tighter">Revenue Control</h1>
        <p class="text-gray-400 text-xs font-bold uppercase tracking-widest">Global Financial Intelligence</p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-10">
        <div class="bg-[#0f172a] p-6 rounded-2xl border border-gray-800">
            <p class="text-gray-500 text-[10px] font-bold uppercase tracking-widest mb-2">Total MRR</p>
            <h2 id="mrr" class="text-2xl font-black text-emerald-500">GHS 0.00</h2>
        </div>
        <div class="bg-[#0f172a] p-6 rounded-2xl border border-gray-800">
            <p class="text-gray-500 text-[10px] font-bold uppercase tracking-widest mb-2">Active Schools</p>
            <h2 id="schools" class="text-2xl font-black text-white">0</h2>
        </div>
        <div class="bg-[#0f172a] p-6 rounded-2xl border border-gray-800">
            <p class="text-gray-500 text-[10px] font-bold uppercase tracking-widest mb-2">At Risk (Past Due)</p>
            <h2 id="at_risk" class="text-2xl font-black text-red-500">0</h2>
        </div>
        <div class="bg-[#0f172a] p-6 rounded-2xl border border-gray-800">
            <p class="text-gray-500 text-[10px] font-bold uppercase tracking-widest mb-2">Est. Annual</p>
            <h2 id="arr" class="text-2xl font-black text-brand">GHS 0.00</h2>
        </div>
    </div>

    <div class="bg-[#0f172a] rounded-2xl border border-gray-800 p-6">
        <h3 class="text-white font-bold uppercase text-sm mb-4">Payment Channel Mix</h3>
        <div id="channels" class="space-y-4">
            </div>
    </div>
</div>

<script>
    // Fetch the data from the API we just built
    fetch('/api/admin/finance/stats')
        .then(res => res.json())
        .then(data => {
            document.getElementById('mrr').innerText = `GHS ${data.mrr_ghs}`;
            document.getElementById('arr').innerText = `GHS ${data.arr_ghs}`;
            document.getElementById('schools').innerText = data.active_schools;
            document.getElementById('at_risk').innerText = data.delinquent_schools;
            
            const channelContainer = document.getElementById('channels');
            for (const [name, count] of Object.entries(data.channel_mix)) {
                channelContainer.innerHTML += `
                    <div class="flex items-center justify-between p-3 bg-gray-900/50 rounded-xl">
                        <span class="text-xs font-bold uppercase text-gray-400">${name}</span>
                        <span class="text-sm font-black text-white">${count} Transactions</span>
                    </div>
                `;
            }
        });
</script>
{% endblock %}
