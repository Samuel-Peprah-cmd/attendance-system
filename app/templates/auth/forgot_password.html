{% extends "base.html" %}
{% block content %}
<div class="max-w-md mx-auto mt-16">
    <div class="bg-white p-8 rounded-3xl shadow-xl border border-gray-100">
        <div class="text-center mb-8">
            <div class="h-16 w-16 bg-brand/10 text-brand rounded-2xl flex items-center justify-center mx-auto mb-4 text-2xl">
                🔑
            </div>
            <h2 class="text-2xl font-black text-gray-800 tracking-tight">Access Recovery</h2>
            <p class="text-gray-400 text-sm">Enter your email to receive a temporary password.</p>
        </div>

        <form method="POST" class="space-y-6">
            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase mb-2 tracking-widest">Registered Email</label>
                <input type="email" name="email" required 
                       class="w-full p-4 bg-gray-50 border border-gray-100 rounded-2xl focus:ring-2 focus:ring-brand outline-none transition" 
                       placeholder="parent@example.com">
            </div>

            <button type="submit" class="w-full bg-brand text-white font-black py-4 rounded-2xl shadow-lg hover:brightness-95 transition tracking-widest uppercase text-sm">
                Send Recovery Email
            </button>
        </form>

        <div class="mt-8 pt-6 border-t border-gray-50 text-center">
            <a href="{{ url_for('auth.login') }}" class="text-xs font-black text-gray-400 hover:text-brand transition uppercase tracking-widest">
                Return to Login
            </a>
        </div>
    </div>
</div>
{% endblock %}
