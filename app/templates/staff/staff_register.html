{% extends "base.html" %}

{% block content %}
<div class="max-w-4xl mx-auto py-10">
    <div class="bg-white rounded-[2.5rem] shadow-xl border border-gray-100 overflow-hidden">
        <div class="p-8 text-white" style="background-color: var(--brand-primary);">
            <h3 class="text-xl font-black uppercase tracking-widest">Personnel Registration</h3>
            <p class="text-xs opacity-70 font-bold uppercase mt-1">Onboard new staff member to the security suite</p>
        </div>
        
        <form action="{{ url_for('staff.register_staff') }}" method="POST" enctype="multipart/form-data" class="p-10">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="space-y-6">
                    <div>
                        <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2">Full Name</label>
                        <input type="text" name="full_name" class="w-full p-4 bg-gray-50 border-0 rounded-2xl focus:ring-2 focus:ring-brand font-bold" required placeholder="Dr. Kwame Mensah">
                    </div>
                    
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2">Staff ID Code</label>
                            <input type="text" name="staff_code" class="w-full p-4 bg-gray-50 border-0 rounded-2xl focus:ring-2 focus:ring-brand font-bold" required placeholder="STF-2026">
                        </div>
                        <div>
                            <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2">Designation</label>
                            <input type="text" name="designation" class="w-full p-4 bg-gray-50 border-0 rounded-2xl focus:ring-2 focus:ring-brand font-bold" required placeholder="HOD, Tutor                                                                   ">
                        </div>
                    </div>

                    <div>
                        <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2">Email Address</label>
                        <input type="email" name="email" class="w-full p-4 bg-gray-50 border-0 rounded-2xl focus:ring-2 focus:ring-brand font-bold" required placeholder="staff@school.edu">
                    </div>

                    <div>
                        <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2">Phone Number</label>
                        <input type="tel" name="phone" class="w-full p-4 bg-gray-50 border-0 rounded-2xl focus:ring-2 focus:ring-brand font-bold" required placeholder="+233 ...">
                    </div>
                </div>

                <div class="space-y-6">
                    <div>
                        <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2">Profile Security Photo</label>
                        <div class="border-4 border-dashed border-gray-100 rounded-[2.5rem] p-8 text-center bg-gray-50 hover:border-brand transition group">
                            <i class="fas fa-camera fa-3x mb-4 text-gray-200 group-hover:text-brand transition"></i>
                            <input type="file" name="photo" class="w-full text-xs font-bold text-gray-400" accept="image/*" required>
                            <p class="text-[9px] text-gray-400 uppercase font-bold mt-4">JPG or PNG (Passport Style Required)</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="mt-12 flex justify-end gap-4 border-t pt-8">
                <a href="{{ url_for('staff.list_staff') }}" class="px-8 py-4 text-[10px] font-black uppercase tracking-widest text-gray-400 hover:text-gray-900 transition">Cancel</a>
                <button type="submit" class="bg-brand text-white px-10 py-4 rounded-2xl font-black uppercase text-[10px] tracking-widest shadow-xl shadow-brand/20 hover:scale-105 transition-all">
                    Register Personnel & Generate ID
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
