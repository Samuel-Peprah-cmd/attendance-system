{% extends "base.html" %}
{% block content %}
<div class="max-w-4xl mx-auto bg-white p-8 rounded-lg shadow-xl border-t-4 border-yellow-500">
    <h2 class="text-3xl font-bold mb-8 text-gray-800">Edit Safety Profile: {{ student.full_name }}</h2>
    
    <form method="POST" enctype="multipart/form-data">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>

        <div class="mb-10 bg-gray-50 p-6 rounded-lg border border-gray-100 flex items-center space-x-6">
            <div class="shrink-0">
                {% if student.photo_path %}
                    <img class="h-28 w-28 object-cover rounded-full shadow-md border-4 border-yellow-500" src="{{ student.photo_path }}" alt="Current photo" />
                {% else %}
                    <div class="h-28 w-28 rounded-full bg-gray-200 flex items-center justify-center text-gray-400 shadow-inner border-4 border-white">
                        <svg class="h-14 w-14" fill="currentColor" viewBox="0 0 24 24"><path d="M24 20.993V24H0v-2.996A14.977 14.977 0 0112.004 15c4.904 0 9.26 2.354 11.996 5.993zM16.002 8.999a4 4 0 11-8 0 4 4 0 018 0z" /></svg>
                    </div>
                {% endif %}
            </div>
            <label class="block">
                <span class="sr-only">Choose profile photo</span>
                <span class="block text-sm font-bold text-gray-700 mb-2">Update Student Photo</span>
                <input type="file" name="student_photo" accept=".png, .jpg, .jpeg" class="block w-full text-sm text-gray-500
                    file:mr-4 file:py-2 file:px-4
                    file:rounded-lg file:border-0
                    file:text-sm file:font-semibold
                    file:bg-yellow-100 file:text-yellow-800
                    hover:file:bg-yellow-200 cursor-pointer transition-colors
                "/>
                <p class="mt-2 text-xs text-gray-400">Leave blank to keep the current photo. Supports JPG and PNG.</p>
            </label>
        </div>
        
        <div class="mb-10">
            <h3 class="text-lg font-semibold text-gray-500 mb-4 border-b pb-2 uppercase text-xs tracking-widest">1. Student Identification</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-bold text-gray-700">Full Name</label>
                    <input type="text" name="full_name" value="{{ student.full_name }}" class="w-full mt-1 p-2 border rounded" required>
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700">Admission No.</label>
                    <input type="text" name="student_code" value="{{ student.student_code }}" class="w-full mt-1 p-2 border rounded" required>
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700">Class/Grade</label>
                    <select name="class_room_id" class="w-full mt-1 p-2 border rounded" required>
                        {% for cls in classes %}
                            <option value="{{ cls.id }}" {{ 'selected' if cls.id == student.class_room_id }}>{{ cls.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700">Gender</label>
                    <select name="gender" class="w-full mt-1 p-2 border rounded">
                        <option value="Male" {{ 'selected' if student.gender == 'Male' }}>Male</option>
                        <option value="Female" {{ 'selected' if student.gender == 'Female' }}>Female</option>
                    </select>
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-bold text-gray-700 mb-1">Date of Birth</label>
                    <input type="date" name="date_of_birth" 
                        value="{{ student.date_of_birth.strftime('%Y-%m-%d') if student.date_of_birth else '' }}"
                        class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-brand outline-none">
                </div>
            </div>
        </div>

        <div class="mb-10">
            <h3 class="text-lg font-semibold text-gray-500 mb-4 border-b pb-2 uppercase text-xs tracking-widest">2. Primary Guardian</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-bold text-gray-700">Guardian Name</label>
                    <input type="text" name="guardian_one_name" value="{{ student.guardian_one_name }}" class="w-full mt-1 p-2 border rounded" required>
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700">Relationship</label>
                    <input type="text" name="guardian_one_relation" value="{{ student.guardian_one_relation }}" class="w-full mt-1 p-2 border rounded" required>
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700">Emergency Phone</label>
                    <input type="text" name="guardian_one_phone" value="{{ student.guardian_one_phone }}" class="w-full mt-1 p-2 border rounded" required>
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700">Alert Email</label>
                    <input type="email" name="guardian_one_email" value="{{ student.guardian_one_email }}" class="w-full mt-1 p-2 border rounded" required>
                </div>
            </div>
        </div>

        <div class="mb-10">
            <h3 class="text-lg font-semibold text-red-600 mb-4 border-b pb-2 uppercase text-xs tracking-widest">3. Medical Information</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-bold text-gray-700">Blood Group</label>
                    <input type="text" name="blood_group" value="{{ student.blood_group }}" class="w-full mt-1 p-2 border rounded">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700">Allergies / Notes</label>
                    <textarea name="medical_notes" class="w-full mt-1 p-2 border rounded" rows="2">{{ student.medical_notes }}</textarea>
                </div>
            </div>
        </div>

        <div class="flex justify-between items-center pt-6 border-t">
            <a href="{{ url_for('students.list_students') }}" class="text-gray-400 hover:text-gray-600">Cancel</a>
            <button type="submit" class="bg-yellow-600 text-white px-10 py-3 rounded-lg font-bold shadow-lg hover:bg-yellow-700">
                Update Student Security Profile
            </button>
        </div>
    </form>
</div>
{% endblock %}
